<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата доступа</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
      color: #222;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #555; line-height: 1.6; }
    .price {
      font-size: 36px;
      font-weight: bold;
      margin: 24px 0;
      color: #111;
    }
    .qr img {
      width: 220px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 8px;
    }
    .hint {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }
    .contact {
      margin-top: 32px;
      font-size: 14px;
    }
    .contact a { color: #0070f3; text-decoration: none; }
  </style>
</head>
<body>

  <h1>Название вашего сервиса</h1>
  <p>Короткое описание — что получит человек после оплаты.</p>

  <div class="price">150 ₽ / мес</div>

  <div class="qr">
    <!-- Сюда вставьте картинку QR-кода -->
    <img src="qr.png" alt="QR для оплаты">
  </div>

  <p class="hint">
    Отсканируйте QR-код или переведите по СБП<br>
    После оплаты напишите мне — выдам доступ в течение часа.
  </p>

  <div class="contact">
    Написать: <a href="https://t.me/ваш_ник">@ваш_ник</a>
  </div>

</body>
</html>
